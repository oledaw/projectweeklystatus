<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PMO Dashboard (JSON-driven)</title>

    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        body {
            margin: 0;
            font-family: 'DM Sans', sans-serif;
            background: #F5F3EF;
            padding: 30px;
        }

        .dashboard {
            max-width: 1000px;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }


        /* EXEC */
        .exec {
            background: #fff;
            border: 1px solid #E2DDD6;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 12px;
        }

        .status {
            font-size: 18px;
            font-weight: 600;
        }

        .score {
            font-family: 'DM Serif Display';
            font-size: 44px;
            margin: 8px 0;
        }

        .trend {
            font-size: 13px;
            color: #6B6560;
        }

        .summary {
            margin-top: 8px;
            font-size: 14px;
            color: #6B6560;
        }

        /* KPI */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 0;
        }

        .kpi {
            background: #fff;
            border: 1px solid #E2DDD6;
            border-radius: 12px;
            padding: 12px;
        }

        .kpi-title {
            font-size: 11px;
            color: #6B6560;
        }


        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .panel {
            background: #fff;
            border: 1px solid #E2DDD6;
            border-radius: 12px;
            padding: 14px;
        }

        h3 {
            margin: 0 0 10px 0;
            font-size: 12px;
            color: #6B6560;
            text-transform: uppercase;
        }

        /* ITEMS */
        .item {
            font-size: 13px;
            margin-bottom: 8px;
        }

        .task {
            padding: 10px;
            border: 1px solid #E2DDD6;
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 999px;
            margin-left: 6px;
            background: #eee;
        }

        .todo {
            background: #F5F3EF;
        }

        .in_progress {
            background: #EAF1F7;
        }

        .blocked {
            background: #FAECEC;
        }

        .timeline-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
            width: 100%;
        }

        .project-title {
            font-size: 20px;
            font-weight: 600;
            flex: 1;
        }

        .project-link {
            font-size: 13px;
            color: #6B6560;
            text-decoration: none;
            border: 1px solid #E2DDD6;
            padding: 6px 10px;
            border-radius: 8px;
            background: #fff;
        }

        .project-link:hover {
            background: #F5F3EF;
        }

        .kpi-value {
            font-weight: 600;
            margin-top: 4px;
            font-size: 14px;
        }

        /* status colors */
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }

        .G {
            background: #2E7D32;
        }

        /* green */
        .A {
            background: #F9A825;
        }

        /* amber */
        .R {
            background: #C62828;
        }

        /* red */

        .kpi-value-wrap {
            display: flex;
            align-items: center;
            font-weight: 600;
        }

        .section {
            margin-top: 0px;
            padding-top: 0px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            margin: 10px 0 12px 0;
            color: #3A3632;
            letter-spacing: 0.3px;
        }

        .timeline-item.active {
            background: #EAF1F7;
            border-left: 3px solid #2E7D32;
            padding-left: 8px;
            border-radius: 6px;
        }

        .planner-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-areas:
                "calendar timeline"
                "tasks tasks";
            gap: 12px;
        }

        /* assign areas */
        /* center calendar inside panel */
        #calendar {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* optional: ensure flatpickr doesn't stretch weirdly */
        .flatpickr-calendar {
            margin: 0 auto;
            box-shadow: none;
        }



        .tasks-panel {
            grid-area: tasks;
        }

        .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #D12E2E;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }

        .flatpickr-day.selected-status {
            filter: brightness(0.75);
        }

        .tasks-collapsible summary {
            cursor: pointer;
            list-style: none;
        }

        .tasks-collapsible summary::-webkit-details-marker {
            display: none;
        }

        /* custom strzałka */
        .tasks-collapsible summary::after {
            content: "▸";
            float: right;
            transition: transform 0.2s ease;
        }

        .tasks-collapsible[open] summary::after {
            transform: rotate(90deg);
        }

        /* spacing */
        .tasks-collapsible #tasks {
            margin-top: 10px;
        }

        .tasks-collapsible summary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }

        .tasks-collapsible h3 {
            margin: 0;
        }

        .divider {
            height: 1px;
            background: #E2DDD6;

        }

        .empty-state {
            font-size: 13px;
            color: #9A948D;
            padding: 10px;
            border: 1px dashed #E2DDD6;
            border-radius: 8px;
            background: #FAF9F7;
        }

        .nav-btn {
            border: 1px solid #E2DDD6;
            background: #fff;
            border-radius: 8px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            background: #F5F3EF;
            transform: translateY(-1px);
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        .survey-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .survey-title-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #timeline {
            grid-area: timeline;
        }

        .survey-nav {
            display: flex;
            gap: 6px;
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }


            .grid {
                grid-template-columns: 1fr;
            }

            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .planner-grid {
                grid-template-columns: 1fr;
                grid-template-areas:
                    "calendar"
                    "timeline"
                    "tasks";
            }

        }
    </style>
</head>

<body>

    <div class="dashboard">

        <!-- HEADER -->
        <div class="project-header">
            <div class="project-title" id="projectTitle"></div>
            <a class="project-link" id="projectLink" href="#" target="_blank">
                Otwórz kartę projektu →
            </a>
        </div>

        <div class="divider"></div>


        <div class="section">
            <div class="survey-header">

                <div class="survey-title-group">
                    <h2 class="section-title" id="predictabilityDate"></h2>

                    <div class="survey-nav">
                        <button class="nav-btn" onclick="prevPredictability()">‹</button>
                        <button class="nav-btn" onclick="nextPredictability()">›</button>
                    </div>
                </div>

                <a class="project-link" href="https://oledaw.github.io/project-predictability-assessment/" target="_blank">
                    Otwórz ankietę →
                </a>

            </div>

            <div class="grid">
                <!-- SCORE -->
                <div class="panel">
                    <h3>Score</h3>

                    <div id="predictabilityScore" class="score" style="font-size:32px; margin:0;"></div>

                    <div id="predictabilityLevel" class="item"></div>
                </div>

                <div class="panel">
                    <h3>Scoring obszarów (1-5)</h3>
                    <div id="areaScores" class="kpi-grid"></div>
                </div>

            </div>

        </div>

        <div class="divider"></div>
        <!-- 1. ANKIETA STATUSOWA -->
        <div class="section">

            <div class="survey-header">

                <div class="survey-title-group">
                    <h2 class="section-title" id="surveyDate"></h2>

                    <div class="survey-nav">
                        <button class="nav-btn" onclick="prevSurvey()">‹</button>
                        <button class="nav-btn" onclick="nextSurvey()">›</button>
                    </div>
                </div>

                <a class="project-link" href="https://oledaw.github.io/projectweeklystatus/" target="_blank">
                    Otwórz ankietę →
                </a>

            </div>

            <div class="grid">
                <!-- SCORE -->
                <div class="panel">


                    <div class="status" id="status"></div>
                    <div class="score" id="score"></div>
                    <div class="trend" id="trend"></div>
                    <div class="summary" id="summary"></div>

                </div>

                <div class="panel">
                    <h3>Scoring obszarów</h3>
                    <div class="kpi-grid" id="kpis"></div>
                </div>
            </div>
        </div>
        <div class="divider"></div>

        <!-- 2. REJESTR RYZYK -->
        <div class="section">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 class="section-title">Rejestr ryzyk</h2>

                <a class="project-link" href="https://oledaw.github.io/riskregister/" target="_blank">
                    Otwórz rejestr ryzyk →
                </a>
            </div>

            <div class="grid">
                <div class="panel">
                    <h3>Top risks</h3>
                    <div id="risks"></div>
                </div>

                <div class="panel">
                    <h3>Actions</h3>
                    <div id="actions"></div>
                </div>
            </div>
        </div>

        <div class="divider"></div>
        <!-- 3. PLANNER -->
        <div class="section">
            <h2 class="section-title">Planner</h2>

            <div class="planner-grid">

                <div class="panel">
                    <div id="calendar"></div>
                </div>

                <div class="panel">
                    <h3>Timeline</h3>
                    <div id="timeline"></div>
                </div>

                <div class="panel tasks-panel">
                    <details class="tasks-collapsible">
                        <summary>
                            <h3>Tasks</h3>
                        </summary>
                        <div id="tasks"></div>
                    </details>
                </div>

            </div>
        </div>



    </div>

    <script>
        /* ───── JSON INPUT (TU PODMIENIASZ DANYMI Z API) ───── */


        const surveyHistory = [{
                "project": {
                    "name": "Project Alpha",
                    "url": "https://example.com/projects/alpha"
                },
                "week": "2026-W19",
                "status": "A",
                "score": 78,
                "prevScore": 83,
                "kpis": [{
                        "name": "Postęp prac",
                        "value": "A",
                        "comment": "Chwilowe spowolnienie"
                    },
                    {
                        "name": "Zakres (Scope)",
                        "value": "G",
                        "comment": "On Track"
                    },
                    {
                        "name": "Ryzyka",
                        "value": "A",
                        "comment": "Monitorowane"
                    },
                    {
                        "name": "Zespół",
                        "value": "G",
                        "comment": "Sprawny"
                    },
                    {
                        "name": "Interesariusze",
                        "value": "R",
                        "comment": "Blokada"
                    }
                ],
                "risks": [
                    "Opóźnienie delivery (2 tyg.)",
                    "Brak decyzji stakeholdera",
                    "Scope creep w module X"
                ],
                "actions": [
                    "Eskalacja do sponsora",
                    "Replan sprintów",
                    "Zamrożenie scope"
                ],
                "summary": "Projekt wymaga stabilizacji w obszarze delivery i decyzji stakeholderów."
            },
            {
                week: "2026-W18",
                date: "23.04.2026",
                status: "G",
                score: 83,
                prevScore: 80,
                summary: "Poprawa sytuacji...",
                kpis: [{
                        name: "Delivery",
                        value: "G",
                        comment: "On Track"
                    },
                    {
                        name: "Scope",
                        value: "G",
                        comment: "Stabilny"
                    }
                ]
            }
        ];


        const data = {
            "project": {
                "name": "Project Alpha",
                "url": "https://example.com/projects/alpha"
            }
        };

        const plans = {
            tasks: [{
                    name: "API integration",
                    status: "in_progress",
                    owner: "Dev Team",
                    due: "2026-05-10"
                },
                {
                    name: "Stakeholder approval",
                    status: "blocked",
                    owner: "PM",
                    due: "2026-05-08"
                },
                {
                    name: "QA testing",
                    status: "todo",
                    owner: "QA",
                    due: "2026-05-12"
                }
            ],

            timeline: [{
                    milestone: "Kickoff",
                    date: "2026-04-01",
                    status: "done",
                    isUpdated: 0
                },
                {
                    milestone: "MVP ready",
                    date: "2026-05-05",
                    status: "done",
                    isUpdated: 0
                },
                {
                    milestone: "UAT",
                    date: "2026-05-15",
                    start: "2026-05-12",
                    status: "in_progress",
                    isUpdated: 1
                },
                {
                    milestone: "Go-live",
                    date: "2026-05-20",
                    status: "planned",
                    isUpdated: 1
                }
            ]
        };

        const AREA_LABELS = {
            requirements: 'Zakres i wymagania',
            tech: 'Technologia',
            deps: 'Zależności zewnętrzne',
            team: 'Zespół',
            planning: 'Planowanie i estymacje',
            risk: 'Zarządzanie ryzykiem'
        };

        const predictabilityHistory = [{
                date: "11.04.2026",
                score: 3.17,
                level: "Wysoka nieprzewidywalność",
                areas: {
                    requirements: 4.5,
                    tech: 2.5,
                    deps: 3.5,
                    team: 2.5,
                    planning: 2.5,
                    risk: 3.5
                }
            },
            {
                date: "04.04.2026",
                score: 3.45,
                level: "Średnia nieprzewidywalność",
                areas: {
                    requirements: 4.0,
                    tech: 3.0,
                    deps: 3.0,
                    team: 3.0,
                    planning: 3.0,
                    risk: 3.5
                }
            }
        ];

        const predictability = {
            "score": 3.17,
            "level": "Wysoka nieprzewidywalność",
            "levelClass": "level-high",
            "unanswered": 0,
            "areas": {
                "requirements": 4.5,
                "tech": 2.5,
                "deps": 3.5,
                "team": 2.5,
                "planning": 2.5,
                "risk": 3.5
            },
            "weakAreas": ["tech", "deps", "team", "planning", "risk"],
            "criticalAreas": [],
            "risks": [{
                    "title": "Ryzyko technologiczne – rozwiązanie może nie zadziałać",
                    "mitigation": "Zrób szybki proof-of-concept..."
                },
                {
                    "title": "Opóźnienia po stronie zewnętrznych dostawców lub zespołów",
                    "mitigation": "Zmapuj wszystkie zależności..."
                }
            ]
        };

        let selectedDate = null;
        let currentIndex = 0;
        let predictabilityIndex = 0;

        function prevPredictability() {
            if (predictabilityIndex < predictabilityHistory.length - 1) {
                predictabilityIndex++;
                renderPredictability();
            }
        }

        function nextPredictability() {
            if (predictabilityIndex > 0) {
                predictabilityIndex--;
                renderPredictability();
            }
        }

        const statusColors = {
            done: "#2E7D32", // zielony
            in_progress: "#F9A825", // żółty
            planned: "#6B6560", // szary
            blocked: "#C62828" // czerwony (jeśli kiedyś dodasz)
        };

        /* ───── RENDER ───── */

        function renderTasks() {
            const el = document.getElementById("tasks");
            el.innerHTML = "";

            plans.tasks.forEach(t => {
                const div = document.createElement("div");
                div.className = "task " + t.status;

                const badge =
                    t.status === "done" ? "✔ DONE" :
                    t.status === "in_progress" ? "⏳ IN PROGRESS" :
                    t.status === "blocked" ? "⛔ BLOCKED" :
                    "• TODO";

                div.innerHTML = `
            <strong>${t.name}</strong>
            <span class="badge">${badge}</span><br>
            Owner: ${t.owner}<br>
            Due: ${t.due}
        `;

                el.appendChild(div);
            });
        }

        function renderTimeline() {
            const el = document.getElementById("timeline");
            el.innerHTML = "";

            plans.timeline.forEach(m => {

                const status =
                    m.status === "done" ? "✔" :
                    m.status === "in_progress" ? "⏳" :
                    "•";

                let rangeText = m.date;

                if (m.start) {
                    rangeText = `${m.start} → ${m.date}`;
                }

                const div = document.createElement("div");
                div.className = "timeline-item";
                div.dataset.date = m.date;
                div.dataset.start = m.start || m.date;

                div.innerHTML = `
            <span>
                ${status} ${m.milestone}
            </span>
            <span>
                ${m.isUpdated ? '<span class="dot"></span>' : ''} ${rangeText}
            </span>
        `;

                div.addEventListener("click", () => {

                    const start = m.start || m.date;
                    const end = m.date;

                    fp.setDate([start, end], true); // 🔥 KLUCZ: RANGE

                    highlightTimelineRange(
                        new Date(start),
                        new Date(end)
                    );
                });

                el.appendChild(div);
            });
        }

        function prevSurvey() {
            if (currentIndex < surveyHistory.length - 1) {
                currentIndex++;
                renderSurvey();
            }
        }

        function nextSurvey() {
            if (currentIndex > 0) {
                currentIndex--;
                renderSurvey();
            }
        }

        function renderProject() {
            document.getElementById("projectTitle").innerText = data.project.name;
            document.getElementById("projectLink").href = data.project.url;
        }

        function highlightTimelineRange(start, end) {

            document.querySelectorAll(".timeline-item")
                .forEach(el => el.classList.remove("active"));

            const startTime = start.getTime();
            const endTime = end.getTime();

            document.querySelectorAll(".timeline-item").forEach(el => {

                const mStart = new Date(el.dataset.start).getTime();
                const mEnd = new Date(el.dataset.date).getTime();

                const overlaps =
                    mStart <= endTime && mEnd >= startTime;

                if (overlaps) {
                    el.classList.add("active");
                }
            });
        }

        function highlightTimeline(date) {

            document.querySelectorAll(".timeline-item")
                .forEach(el => el.classList.remove("active"));

            const el = document.querySelector(`.timeline-item[data-date="${date}"]`);

            if (el) {
                el.classList.add("active");

            }
        }


        const timelineMap = new Map(
            plans.timeline.map(m => [m.date, m])
        );

        let fp = null;

        const allowedDates = [];

        // helper: format YYYY-MM-DD
        const formatDate = (d) => d.toISOString().slice(0, 10);

        // 1. timeline range’y
        plans.timeline.forEach(m => {
            const start = new Date(m.start || m.date);
            const end = new Date(m.date);

            let d = new Date(start);

            while (d <= end) {
                allowedDates.push(formatDate(d));
                d.setDate(d.getDate() + 1);
            }
        });

        // 2. TODAY 🔥
        allowedDates.push(formatDate(new Date()));


        fp = flatpickr("#calendar", {
            inline: true,
            defaultDate: "today",
            enable: allowedDates,


            onDayCreate: function(dObj, dStr, fp, dayElem) {
                const year = dayElem.dateObj.getFullYear();
                const month = String(dayElem.dateObj.getMonth() + 1).padStart(2, "0");
                const day = String(dayElem.dateObj.getDate()).padStart(2, "0");

                const date = `${year}-${month}-${day}`;

                const match = timelineMap.get(date);

                if (match) {
                    const color = statusColors[match.status];

                    if (date === selectedDate) {
                        dayElem.classList.add("selected-status");
                    }

                    if (color) {
                        dayElem.style.background = color;
                        dayElem.style.color = "#fff";
                        dayElem.style.borderRadius = "6px";
                    }

                    dayElem.title = match.milestone;
                }
            },

            onChange: function(selectedDates, dateStr, instance) {

                if (selectedDates.length === 0) return;

                const d = selectedDates[0];

                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, "0");
                const day = String(d.getDate()).padStart(2, "0");

                selectedDate = `${year}-${month}-${day}`;

                highlightTimeline(selectedDate);
                fp.redraw();
            }
        });

        function renderPredictability() {

            const p = predictabilityHistory[predictabilityIndex];

            document.getElementById("predictabilityDate").innerText =
                `Ankieta przewidywalności (${p.date})`;

            document.getElementById("predictabilityScore").innerText = p.score;
            document.getElementById("predictabilityLevel").innerHTML =
                `<strong>${p.level}</strong>`;

            renderAreaScores(p);
        }

        function renderAreaScores(p) {

            const container = document.getElementById("areaScores");
            container.innerHTML = "";

            const getColor = (v) => {
                if (v >= 4) return "G";
                if (v >= 3) return "A";
                return "R";
            };

            Object.entries(p.areas).forEach(([key, value]) => {

                const label = AREA_LABELS[key] || key;

                const el = document.createElement("div");
                el.className = "kpi";

                el.innerHTML = `
            <div class="kpi-title">${label}</div>
            <div class="kpi-value-wrap">
                <span class="status-dot ${getColor(value)}"></span>
                <span class="kpi-value">${value.toFixed(1)}</span>
            </div>
        `;

                container.appendChild(el);
            });
        }


        function renderSurvey() {

            const data = surveyHistory[currentIndex];

            const statusMap = {
                G: "🟢 DOBRY",
                A: "🟡 UWAGA",
                R: "🔴 ZAGROŻONY"
            };

            document.getElementById("surveyDate").innerText =
                `Ankieta statusowa (${data.week})`;

            document.getElementById("status").innerText = statusMap[data.status];
            document.getElementById("score").innerText = data.score;

            const diff = data.score - data.prevScore;

            document.getElementById("trend").innerText =
                diff === 0 ? "→ bez zmian" :
                diff > 0 ? `📈 +${diff} vs last week` :
                `📉 ${diff} vs last week`;

            document.getElementById("summary").innerText = data.summary;

            const kpi = document.getElementById("kpis");
            kpi.innerHTML = "";

            data.kpis.forEach(k => {
                const el = document.createElement("div");
                el.className = "kpi";
                el.innerHTML = `
            <div class="kpi-title">${k.name}</div>
            <div class="kpi-value-wrap">
                <span class="status-dot ${k.value}"></span>
                <span class="kpi-value">${k.comment}</span>
            </div>
        `;
                kpi.appendChild(el);
            });

            /* RISKS */
            const risksEl = document.getElementById("risks");

            if (!data.risks || data.risks.length === 0) {
                risksEl.innerHTML = `
        <div class="empty-state">
            ✔ Brak istotnych ryzyk
        </div>
    `;
            } else {
                risksEl.innerHTML = data.risks
                    .map(r => `<div class="item">⚠ ${r}</div>`)
                    .join("");
            }

            /* ACTIONS */
            const actionsEl = document.getElementById("actions");

            if (!data.actions || data.actions.length === 0) {
                actionsEl.innerHTML = `
        <div class="empty-state">
            ✔ Brak działań do wykonania
        </div>
    `;
            } else {
                actionsEl.innerHTML = data.actions
                    .map(a => `<div class="item">• ${a}</div>`)
                    .join("");
            }
        }

        renderProject();
        renderSurvey();
        renderTasks();
        renderTimeline();
        renderPredictability();
    </script>


</body>

</html>
